name: Verify

# Manually triggered from the GitHub web UI:
#   Actions -> Verify -> Run workflow
on:
  workflow_dispatch:

# Allow the job to push the auto-formatting commit back to the branch.
permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # Verification pass: format, build, clippy, tests.
      # Formatting is applied (not just checked) so any fixes can be committed.
      - name: Format
        run: cargo fmt --all

      - name: Build
        run: cargo build --locked

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      # Commit and push only the changes produced by the steps above
      # (in practice, cargo fmt). No changes => nothing is committed.
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "style: apply cargo fmt via Verify workflow"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "Working tree clean - nothing to commit."
          fi
