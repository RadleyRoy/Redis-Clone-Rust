name: Verify

# Manually triggered from the GitHub web UI:
#   Actions -> Verify -> Run workflow
on:
  workflow_dispatch:

# Read-only: this workflow verifies the code but never writes to the repo.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # Each check is its own step so its status and logs show up
      # separately in the GitHub Actions UI.
      - name: Format
        run: cargo fmt --all --check

      - name: Build
        run: cargo build --locked

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked
